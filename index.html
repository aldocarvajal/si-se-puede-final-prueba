
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fundación Sí Se Puede</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- Encabezado -->
  <header class="main-header">
    <div class="logo-text">
      <img src="assets/images/logoblanco.png" alt="Logo Fundación" class="logo">
      <div class="header-text">
        <h1>Sí Se Puede:</h1>
        <p>Ayuda real, cambio verdadero.</p>
      </div>
    </div>

    <div class="header-right">
      <div class="social-menu">
        <img src="assets/images/instablanco.png" alt="Instagram">
        <img src="assets/images/facebookblanco.png" alt="Facebook">
        <img src="assets/images/telefonoblanco.png" alt="Teléfono">
        <button class="hamburger">&#9776;</button>
      </div>

      <!-- Menú principal -->
      <nav class="main-nav">
        <ul>
          <li><a href="#">Misión</a></li>
          <li><a href="#">Visión</a></li>
          <li><a href="#">Quiénes Somos</a></li>
          <li><a href="#">Contáctanos</a></li>
          <li><a href="#">Buscar...</a></li>
        </ul>
      </nav>

      <!-- Menú hamburguesa -->
      <nav class="hamburger-menu">
        <ul>
          <li><a href="#">Iniciar Sesión</a></li>
          <li><a href="#">Editar Portada</a></li>
          <li><a href="#">Añadir Publicaciones</a></li>
          <li><a href="#">Publicaciones y Feed</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Carrusel -->
  <section class="carousel">
    <div class="slides">
      <img src="assets/images/Portada-1.jpeg" alt="Portada 1">
      <img src="assets/images/Portada-2.jpeg" alt="Portada 2">
      <img src="assets/images/Portada-3.jpeg" alt="Portada 3">
      <img src="assets/images/Portada-4.jpeg" alt="Portada 4">
    </div>
  </section>

  <script src="index.js"></script>
</body>
</html>
